status = warn
rootLogger.level = warn
appenders = file, console


# Log files location
property.basePath = ../log

# Redirect log messages to console
appender.console.type = Console
appender.console.name = STDOUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern =  %d{yyyy-MM-dd HH:mm:ss} %-5p %c{1}:%L - %m%n

# Redirect log messages to a log file, support file rolling.
appender.file.type = RollingFile
appender.file.name = File
appender.file.fileName = ${basePath}/testing-tool.log
appender.file.filePattern = ${basePath}/$${date:yyyy-MM}/testing-tool-%d{MM-dd-yyyy}-%i.log.gz
appender.file.layout.type = PatternLayout
appender.file.layout.pattern =  %d{yyyy-MM-dd HH:mm:ss} %-5p %c{1}:%L - %m%n
appender.file.policies.type = Policies
appender.file.policies.size.type = SizeBasedTriggeringPolicy
appender.file.policies.size.size=10MB
appender.file.strategy.type = DefaultRolloverStrategy
appender.file.strategy.max = 10

rootLogger.appenderRefs = file, console
rootLogger.appenderRef.console.ref = STDOUT
rootLogger.appenderRef.file.ref = File



# Set the tool's log level to INFO - this should be enough for most cases
logger.modeling.name = com.denodo.connect.testing
logger.modeling.level = info
logger.modeling.additivity = false
logger.modeling.appenderRefs = file, console
logger.modeling.appenderRef.console.ref = STDOUT
logger.modeling.appenderRef.file.ref = File
# Set the VDP JDBC Driver's log level to FATAL
logger.vdb.name = com.denodo.vdb
logger.vdb.level = FATAL
logger.vdb.additivity = false
logger.vdb.appenderRefs = file, console
logger.vdb.appenderRef.console.ref = STDOUT
logger.vdb.appenderRef.file.ref = File

# This sets HikariCP's JDBC Driver location utils to ERROR in order to avoid it shouting
# a complete exception trace as a WARN through the logs every time a JDBC driver is not directly
# on the classpath and instead has to be found somewhere else (e.g. dbAdapters mechanism).
logger.hikari.name = com.zaxxer.hikari.util.DriverDataSource
logger.hikari.level = error
logger.hikari.additivity = false
logger.hikari.appenderRefs = file, console
logger.hikari.appenderRef.console.ref = STDOUT
logger.hikari.appenderRef.file.ref = File

# You might also want to set to FATAL other drivers' logs, like e.g. MySQL's
# log4j.logger.com.mysql.jdbc=FATAL
